name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Lint (API)
      run: npm run lint -w api || echo "Lint warnings allowed"

    - name: Build API
      run: npm run build -w api

    - name: Build Web
      run: npm run build -w web
      env:
        NEXT_PUBLIC_API_URL: https://ai-crm-iay1.onrender.com
        SKIP_ESLINT_BUILD_ERRORS: true # Temporary until package versions are synced
